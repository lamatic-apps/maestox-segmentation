<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maestrox – Run History</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }

    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: calc(100vh - 48px); }

    /* ── Sidebar ── */
    .sidebar { background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .sidebar-sub { font-size: 0.75rem; color: #4b5563; margin-bottom: 16px; }
    .run-list { flex: 1; overflow-y: auto; }

    .run-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 6px;
      transition: background 0.15s, border-color 0.15s;
    }
    .run-item:hover { background: #0f1117; }
    .run-item.active { background: #13152a; border-color: #6366f1; }
    .run-date { font-size: 0.78rem; font-weight: 600; color: #e2e8f0; }
    .run-meta { font-size: 0.7rem; color: #6b7280; margin-top: 2px; }

    .empty-list { font-size: 0.85rem; color: #4b5563; font-style: italic; padding: 20px 0; text-align: center; }

    /* ── Main area ── */
    .main { display: flex; flex-direction: column; gap: 16px; overflow: hidden; }

    .placeholder-msg {
      background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      height: 100%; font-size: 0.9rem; color: #4b5563; font-style: italic;
    }

    /* ── Carousel ── */
    .carousel-section { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 16px; flex-shrink: 0; }
    .carousel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .carousel-header label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #4b5563; }
    .carousel-counter { font-size: 0.8rem; color: #6b7280; }
    .carousel-track-wrap { position: relative; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 180px; }
    .carousel-img { max-width: 100%; max-height: 320px; object-fit: contain; display: block; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(30,34,53,0.85); border: 1px solid #3d3f5e; color: #e2e8f0; border-radius: 8px; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .carousel-btn:hover { background: #2d3148; }
    .carousel-btn.prev { left: 8px; }
    .carousel-btn.next { right: 8px; }
    .carousel-btn:disabled { opacity: 0.3; cursor: default; }
    .carousel-dots { display: flex; justify-content: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: #2d3148; cursor: pointer; transition: background 0.2s; }
    .carousel-dot.active { background: #6366f1; }

    /* ── Results columns ── */
    .results-row { display: grid; grid-template-columns: 300px 1fr; gap: 14px; flex: 1; min-height: 0; }

    .segments-col { display: flex; flex-direction: column; overflow: hidden; }
    .col-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #4b5563; margin-bottom: 8px; flex-shrink: 0; }
    .segments-scroll { flex: 1; overflow-y: auto; }

    .segment-card { background: #0f1117; border: 1px solid #2d3148; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
    .segment-card:hover { border-color: #6366f1; }
    .segment-card.active { border-color: #6366f1; background: #13152a; }
    .segment-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .segment-info { flex: 1; min-width: 0; }
    .segment-type { font-size: 0.76rem; font-weight: 700; color: #e2e8f0; text-transform: capitalize; }
    .segment-pages { font-size: 0.7rem; color: #6b7280; margin-top: 1px; }
    .segment-count { font-size: 0.68rem; color: #4b5563; margin-top: 1px; }

    .json-col { display: flex; flex-direction: column; overflow: hidden; }
    .json-box {
      flex: 1; background: #0a0c14; border: 1px solid #1e2235; border-radius: 10px;
      padding: 14px; overflow-y: auto; font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.73rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
      color: #a5b4fc;
    }

    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar: run list -->
    <div class="sidebar">
      <div class="sidebar-title">Run History</div>
      <div class="sidebar-sub">Click a run to view results</div>
      <div class="run-list" id="run-list">
        <div class="empty-list"><span class="spinner"></span> Loading…</div>
      </div>
    </div>

    <!-- Main: placeholder until run selected -->
    <div class="main" id="main">
      <div class="placeholder-msg">Select a run from the sidebar</div>
    </div>
  </div>

  <script>
    const DOC_TYPE_COLORS = {
      vesting_deed: '#6366f1', deed_notice: '#0ea5e9', policy: '#10b981',
      searcher_sheet: '#f59e0b', other: '#6b7280', map: '#ec4899',
      mortgage: '#8b5cf6', assignment_of_mortgage: '#14b8a6',
      lis_pendens: '#f97316', tax_assessment: '#84cc16',
      master_deed_amendment: '#06b6d4', run_sheet: '#f59e0b',
      order_form: '#a78bfa', estate: '#e879f9', master_deed: '#22d3ee',
      easements_restrictions: '#fb923c', declaration_of_taking: '#f43f5e',
      declaration_of_covenants_and_restrictions: '#a3e635',
    };
    function docColor(t) { return DOC_TYPE_COLORS[t?.toLowerCase().replace(/ /g,'_')] || '#6b7280'; }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    let carouselUrls = [], carouselIdx = 0;

    function initCarousel(urls) {
      carouselUrls = urls; carouselIdx = 0;
      renderDots(); updateCarousel();
    }
    function renderDots() {
      document.getElementById('carousel-dots').innerHTML =
        carouselUrls.map((_,i) => `<div class="carousel-dot${i===0?' active':''}" onclick="goTo(${i})"></div>`).join('');
    }
    function updateCarousel() {
      document.getElementById('carousel-img').src = carouselUrls[carouselIdx] || '';
      document.getElementById('carousel-counter').textContent = `${carouselIdx+1} / ${carouselUrls.length}`;
      document.getElementById('carousel-prev').disabled = carouselIdx === 0;
      document.getElementById('carousel-next').disabled = carouselIdx === carouselUrls.length - 1;
      document.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===carouselIdx));
    }
    function carouselMove(dir) { carouselIdx = Math.max(0, Math.min(carouselUrls.length-1, carouselIdx+dir)); updateCarousel(); }
    function goTo(i) { carouselIdx = i; updateCarousel(); }

    // Load run list
    async function loadRuns() {
      const res = await fetch('/api/runs');
      const runs = await res.json();
      const list = document.getElementById('run-list');
      if (!runs.length) { list.innerHTML = '<div class="empty-list">No runs yet</div>'; return; }
      list.innerHTML = runs.map(r => {
        const d = new Date(r.timestamp);
        return `<div class="run-item" onclick="loadRun('${r.id}', this)">
          <div class="run-date">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</div>
          <div class="run-meta">${r.urlCount} pages</div>
        </div>`;
      }).join('');
    }

    async function loadRun(id, el) {
      document.querySelectorAll('.run-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('main').innerHTML = `<div class="placeholder-msg"><span class="spinner"></span> Loading run…</div>`;

      const res = await fetch(`/api/runs?id=${id}`);
      const run = await res.json();
      renderRun(run);
    }

    function renderRun(run) {
      const output = run.groupedOutput?.data?.output?.result?.output ?? null;

      // Collect all page URLs from batchResults in order
      const allUrls = (run.batchResults ?? []).flatMap(b =>
        b.result?.data?.input?.url ?? []
      );

      const main = document.getElementById('main');
      main.innerHTML = `
        <div class="carousel-section">
          <div class="carousel-header">
            <label>Pages</label>
            <span class="carousel-counter" id="carousel-counter"></span>
          </div>
          <div class="carousel-track-wrap">
            <button class="carousel-btn prev" id="carousel-prev" onclick="carouselMove(-1)">&#8249;</button>
            <img class="carousel-img" id="carousel-img" src="" alt="Page" />
            <button class="carousel-btn next" id="carousel-next" onclick="carouselMove(1)">&#8250;</button>
          </div>
          <div class="carousel-dots" id="carousel-dots"></div>
        </div>
        <div class="results-row">
          <div class="segments-col">
            <div class="col-label">Segments</div>
            <div class="segments-scroll" id="segments-col"></div>
          </div>
          <div class="json-col">
            <div class="col-label">Output JSON</div>
            <div class="json-box" id="json-box"></div>
          </div>
        </div>`;

      initCarousel(allUrls);

      if (!output) {
        document.getElementById('json-box').textContent = JSON.stringify(run.groupedOutput, null, 2);
        return;
      }

      // Render segment cards
      document.getElementById('segments-col').innerHTML = Object.entries(output).map(([docType, segs], i) => {
        const color = docColor(docType);
        const label = docType.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
        const segVals = Object.values(segs);
        const startPage = Math.min(...segVals.map(s => s.start_page));
        const endPage = Math.max(...segVals.map(s => s.end_page));
        const totalPages = segVals.reduce((sum, s) => sum + (s.pages?.length ?? 0), 0);
        return `<div class="segment-card${i===0?' active':''}" onclick="selectDoc('${docType}', this, ${startPage})">
          <div class="segment-dot" style="background:${color}"></div>
          <div class="segment-info">
            <div class="segment-type">${esc(label)}</div>
            <div class="segment-pages">Pages ${startPage} – ${endPage}</div>
            <div class="segment-count">${totalPages} pages · ${segVals.length} segment${segVals.length!==1?'s':''}</div>
          </div>
        </div>`;
      }).join('');

      renderJson(output);
    }

    function selectDoc(docType, el, startPage) {
      document.querySelectorAll('.segment-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      // Jump carousel to first page of this doc type (1-based → 0-based)
      goTo(Math.max(0, startPage - 1));
      // Scroll JSON to anchor
      const anchor = document.getElementById('json-anchor-' + docType);
      if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderJson(output) {
      const box = document.getElementById('json-box');
      const entries = Object.entries(output);
      let html = '<span style="color:#6b7280">{\n</span>';
      entries.forEach(([key, val], i) => {
        const comma = i < entries.length - 1 ? ',' : '';
        const valStr = esc(JSON.stringify(val, null, 2)).replace(/\n/g, '\n  ');
        html += `<span id="json-anchor-${esc(key)}" style="display:block;scroll-margin-top:8px">  <span style="color:#818cf8">"${esc(key)}"</span>: ${valStr}${comma}\n</span>`;
      });
      html += '<span style="color:#6b7280">}</span>';
      box.innerHTML = html;
    }

    loadRuns();
  </script>
</body>
</html>
